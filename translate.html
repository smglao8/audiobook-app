<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Translate - Audiobook App</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
</head>

<body>

<div class="nav">
  <a href="home.html">🏠 Home</a>
  <a href="reader.html">📄 Reader</a>
  <a href="generate.html">🎧 Generate</a>
  <a href="library.html">📚 Library</a>
  <a href="translate.html">🌍 Translate</a>
  <a href="settings.html">⚙ Settings</a>
</div>

<div class="container">

<h1>🌍 Translator</h1>

<p>Upload or paste text to translate for audiobook generation</p>

<!-- FILE UPLOAD -->
<div class="card">
<h3>📂 Upload File</h3>
<input type="file" id="fileInput">
</div>

<!-- INPUT TEXT -->
<div class="card">
<h3>✍️ Original Text</h3>
<textarea id="originalText" placeholder="Paste or load text here..."></textarea>
</div>

<!-- CONTROLS -->
<div class="card">

<h3>⚙ Settings</h3>

<select id="targetLang">
  <option value="en">English</option>
  <option value="fr">French</option>
  <option value="es">Spanish</option>
  <option value="sw">Swahili</option>
</select>

<br><br>

<button class="action" onclick="translateText()">🌐 Translate</button>
<button class="blue" onclick="sendToReader()">📄 Send to Reader</button>
<button class="stop" onclick="clearAll()">🧹 Clear</button>

</div>

<!-- OUTPUT -->
<div class="card">

<h3>📘 Translated Text</h3>
<textarea id="translatedText" placeholder="Translation output..."></textarea>

</div>

<div id="statusBox" class="card">Ready</div>

</div>

<script>

/* ================= FILE LOADER ================= */
async function extractText(file){

const ext = file.name.split('.').pop().toLowerCase();

if(ext === "txt"){
document.getElementById("originalText").value = await file.text();
}

else if(ext === "pdf"){
const reader = new FileReader();

reader.onload = async function(){
const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;

let text = "";

for(let i = 1; i <= pdf.numPages; i++){
const page = await pdf.getPage(i);
const content = await page.getTextContent();
text += content.items.map(item => item.str).join(" ") + "\n\n";
}

document.getElementById("originalText").value = text;
};

reader.readAsArrayBuffer(file);
}

else if(ext === "docx"){
const reader = new FileReader();

reader.onload = function(){
mammoth.extractRawText({arrayBuffer: reader.result})
.then(res => {
document.getElementById("originalText").value = res.value;
});
};

reader.readAsArrayBuffer(file);
}
}

/* ================= EVENT ================= */
document.getElementById("fileInput").addEventListener("change", function(e){
if(e.target.files[0]){
extractText(e.target.files[0]);
}
});

/* ================= TRANSLATE (FIXED BACKEND CALL) ================= */
async function translateText(){

const text = document.getElementById("originalText").value;
const target = document.getElementById("targetLang").value;

if(!text){
alert("No text to translate");
return;
}

document.getElementById("statusBox").innerText = "🌍 Translating...";

try{

const res = await fetch("http://localhost:3000/translate", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
q: text,
target: target
})
});

const data = await res.json();

if(!data.translatedText){
throw new Error("No translation returned");
}

document.getElementById("translatedText").value = data.translatedText;

document.getElementById("statusBox").innerText = "✅ Translation complete";

saveTranslation(text, data.translatedText);

}catch(err){
console.log(err);
document.getElementById("statusBox").innerText =
"❌ Translation failed (check backend)";
}
}

/* ================= SAVE ================= */
function saveTranslation(original, translated){

let data = JSON.parse(localStorage.getItem("translations") || "[]");

data.push({
id: Date.now(),
original,
translated,
time: new Date().toISOString()
});

localStorage.setItem("translations", JSON.stringify(data));
}

/* ================= SEND TO READER ================= */
function sendToReader(){

const text = document.getElementById("translatedText").value;

if(!text){
alert("Nothing to send");
return;
}

localStorage.setItem("readerText", text);

alert("Sent to Reader!");
}

/* ================= CLEAR ================= */
function clearAll(){

document.getElementById("originalText").value = "";
document.getElementById("translatedText").value = "";

document.getElementById("statusBox").innerText = "🧹 Cleared";
}

</script>

</body>
</html>
