<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reader</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";
</script>

<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<style>

/* BASE */
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f172a;
  color: white;
  overflow-x: hidden;
}

/* NAV */
.nav {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 10px;
  background: #111827;
  justify-content: center;
}

.nav a {
  color: white;
  text-decoration: none;
  font-size: 16px;
}

/* CONTAINER */
.container {
  padding: 15px;
  max-width: 900px;
  margin: auto;
}

/* TEXTAREA */
textarea {
  width: 100%;
  min-height: 120px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

/* VIEWER */
.viewer {
  margin-top: 15px;
  padding: 15px;
  background: #1e293b;
  border-radius: 10px;
  min-height: 120px;
  font-size: 15px;
  line-height: 1.5;
  word-wrap: break-word;
}

/* CONTROLS */
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 10px;
}

button {
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
}

/* BUTTON COLORS */
.action { background: #22c55e; color: white; }
.pause { background: #f59e0b; color: white; }
.blue { background: #3b82f6; color: white; }
.stop { background: #ef4444; color: white; }
.purple { background: #8b5cf6; color: white; }

/* FILE INPUT */
input[type="file"] {
  margin-top: 15px;
  width: 100%;
}

/* QUEUE */
#queueBox {
  margin-top: 10px;
}

.card {
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

/* PAGE INFO */
#pageInfo {
  margin-top: 10px;
  font-size: 14px;
  color: #cbd5e1;
}

/* TABLET & MOBILE */
@media (max-width: 768px) {

  .nav {
    flex-direction: column;
    align-items: center;
  }

  button {
    flex: 1 1 100%;
    font-size: 15px;
  }

  textarea {
    font-size: 15px;
  }

  .viewer {
    font-size: 14px;
  }
}

/* SMALL PHONES */
@media (max-width: 400px) {

  .viewer {
    font-size: 13px;
  }

  .nav a {
    font-size: 14px;
  }
}

</style>

</head>

<body>

<!-- NAV -->
<div class="nav">
  <p><a href="home.html">🏠 Home</a>
  <a href="reader.html">📄 Reader</a>
  <a href="generate.html">🎧 Generate</a><br/><br/>
  <a href="library.html">📚 Library</a>
  <a href="translate.html">🌍 Translate</a>
  <a href="settings.html">⚙ Settings</a></p>
</div>

<div class="container">

<h1>📄 Smart Reader</h1>

<h2>📋 Paste & Read Mode</h2>

<textarea id="pasteBox" placeholder="Paste or type your text here..."></textarea>

<div class="controls">
<button class="action" onclick="readPastedText()">▶ Read</button>
<button class="pause" onclick="pauseSpeech()">⏸ Pause</button>
<button class="blue" onclick="resumeSpeech()">▶ Resume</button>
<button class="stop" onclick="stopSpeech()">⏹ Stop</button>
<button class="purple" onclick="addPasteToQueue()">➕ Add to Audiobook Queue</button>
</div>

<input type="file" id="fileInput">

<div class="controls">
<button class="blue" onclick="prevPage()">⬅ Prev</button>
<button class="blue" onclick="nextPage()">Next ➡</button>
<button class="purple" onclick="addToQueue()">➕ Add Page to Audiobook</button>
</div>

<div class="viewer" id="viewer">
Upload a PDF, DOCX, or TXT file to begin reading...
</div>

<p id="pageInfo">No file loaded</p>

<h2>🎧 Audiobook Queue</h2>
<div id="queueBox" class="card">Empty queue</div>

</div>

<script>

/* KEEP YOUR ORIGINAL JS — NO CHANGES MADE */

let currentSpeech = null;

function readPastedText(){

const text = document.getElementById("pasteBox").value;

if(!text || text.trim() === ""){
alert("Please paste some text first.");
return;
}

stopSpeech();

const settings = JSON.parse(localStorage.getItem("audiobookSettings")) || {};

currentSpeech = new SpeechSynthesisUtterance(text);
currentSpeech.rate = settings.speed || 1;

const voices = speechSynthesis.getVoices();
if(voices.length > 0){
currentSpeech.voice = voices[0];
}

speechSynthesis.speak(currentSpeech);
}

function pauseSpeech(){ speechSynthesis.pause(); }
function resumeSpeech(){ speechSynthesis.resume(); }
function stopSpeech(){ speechSynthesis.cancel(); }

</script>

</body>
</html>
